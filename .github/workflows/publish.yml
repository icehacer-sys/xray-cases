name: xray-poster

# Publishes the daily X-ray case for @mdnoteslab in the cloud (no need for your PC on).
#
# A run polls every ~15 min and, before it ends, launches the next run -- a perpetual
# chain that is ALWAYS alive (workflow_dispatch self-launch works with the built-in
# token). Each cycle runs `npm run live`, which only acts on cases whose schedule is
# due (challenge at postAt, answer + CTA after their delays), so outside those moments
# the runs just no-op. State + any drafted case.json are committed back so a restart
# never double-posts. Concurrency keeps it a single chain; the */30 cron restarts it
# only if a hand-off ever fails. Start it once (Actions -> Run workflow); disable to stop.
#
# NOTE: this repo must be PUBLIC so the raw image URLs (GITHUB_RAW_BASE) are fetchable
# by Meta's Threads/Instagram publish APIs.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY
#   OPENAI_API_KEY      (X-ray image generation for the auto-generator top-up)
#   THREADS_ACCESS_TOKEN
#   IG_ACCESS_TOKEN
#   FB_PAGE_ID              (Facebook Page "Weird X-Ray Case Files" numeric id)
#   FB_PAGE_ACCESS_TOKEN    (long-lived Page token; see FACEBOOK_SETUP.md) -- then flip BOT_FACEBOOK to "on"

on:
  schedule:
    - cron: "*/30 * * * *" # heartbeat to (re)start the polling loop; the loop does the 15-min cadence
  workflow_dispatch: # lets you run it manually from the Actions tab
    inputs:
      mode:
        description: "Run mode: live | dry | slidesample | rebuild (regen kept slides + top up queue)"
        type: choice
        options: [live, dry, slidesample, rebuild]
        default: live

# Never let two runs overlap (they'd both read the same state and double-post).
concurrency:
  # Separate group per mode so a one-off slidesample/dry run doesn't queue behind the
  # long-lived live chain (schedule + live both resolve to the same 'live' group).
  group: xray-poster-${{ github.event.inputs.mode || 'live' }}
  cancel-in-progress: false

# contents: commit state.json + updated case.json back. actions: hand off to a fresh
# run near the 6h job limit.
permissions:
  contents: write
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      THREADS_USER_ID: me
      GITHUB_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}
      BOT_CONFIRM_LIVE: "yes"
      BOT_INSTAGRAM: "off" # IG discontinued -- Threads only (owner, 2026-06-29)
      BOT_FACEBOOK: "off" # FB dropped — Threads only (owner deleted the Page over the "AI info" label, 2026-07-03). Off also disables the FB answer-comment (that stage requires BOT_FACEBOOK). Flip to "on" to restore.
      BOT_FB_LEAD_MIN: "10" # Facebook gets the challenge ~10 min before Threads (early access for FB followers)
      BOT_AUTO_APPROVE: "on" # owner trusts gpt-image-2: generated cases post without manual review
      BOT_XRAY_VERIFY: "on" # Claude vision checks each generated X-ray for AI anatomy defects; failures are regenerated or held for review
      BOT_CENSOR_GENITALS: "on" # blur external genitalia on the X-ray + slides so Threads/IG don't flag the post as sensitive
      BOT_TOPIC_TAG: "Med Threads" # topic tag added to every challenge post
      BOT_POST_HOUR_UTC: "18" # generated cases schedule at 18:00 UTC = 9 PM Cairo (summer, UTC+3). Changed from 10 PM (owner, 2026-07-03). NOTE: revisit at late-Oct DST — 18 UTC becomes 8 PM Cairo.
      BOT_ANSWER_DELAY_MIN: "20" # answer posts 20 min after the challenge
      BOT_CTA_DELAY_MIN: "75" # CTA posts 55 min after the answer (75 after the challenge)
      BOT_CTA_REPLY: "off" # owner posts the CTA manually so the Gumroad cover preview shows; bot does not auto-reply the CTA
      BOT_MODEL: "claude-sonnet-4-6"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # One run polls every ~15 minutes for hours instead of relying on GitHub's cron
      # (which throttles fine-grained schedules badly). Each cycle runs `npm run live`,
      # commits any progress (state.json + drafted/posted case.json), sleeps 15 min,
      # repeats. Near the 6h job limit it hands off to a fresh run so coverage is
      # continuous. State + case.json are pushed each cycle so a restart never
      # double-posts. Long runs are free on this public repo.
      - name: Poll every ~15 min (perpetual chain)
        env:
          MODE: ${{ github.event.inputs.mode || 'live' }}
          GH_TOKEN: ${{ github.token }}
          MAXSECS: "19800" # ~5.5h per run, then it launches the next (under the 6h job limit)
        run: |
          # Push local commits, retrying rebase+push. Runs every loop (not only when the tree is
          # freshly dirty) so a push that failed on a previous loop is genuinely retried instead of
          # being lost at the next hand-off. On a rebase conflict it aborts (never leaves the repo
          # mid-rebase, which used to break every later push in the run) and retries.
          sync_repo() {
            for attempt in 1 2 3; do
              if ! git pull --rebase --autostash origin "${GITHUB_REF_NAME}"; then
                git rebase --abort 2>/dev/null || true
                echo "rebase failed (attempt $attempt/3), retrying in 3s"; sleep 3; continue
              fi
              if git push; then return 0; fi
              echo "push failed (attempt $attempt/3), retrying in 3s"; sleep 3
            done
            echo "WARNING: git sync failed after 3 attempts; will retry next loop"; return 0
          }
          if [ "$MODE" = "dry" ]; then
            npm run dry
            exit 0
          fi
          if [ "$MODE" = "rebuild" ]; then
            git config user.name "xray-poster"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            echo "rebuild: regenerate kept cases' gpt-image-2 slides, then top up the queue"
            npx tsx src/render.ts || echo "render errored, continuing"
            npm run generate -- --topup --threads-only || echo "topup errored, continuing"
            if [ -n "$(git status --porcelain cases data/conditions.json data/used-diagnoses.json)" ]; then
              git add cases data/conditions.json data/used-diagnoses.json
              git commit -m "chore: rebuild gpt-image-2 slides + top up queue [skip ci]"
            fi
            sync_repo
            exit 0
          fi
          if [ "$MODE" = "slidesample" ]; then
            git config user.name "xray-poster"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            npx tsx src/slidesample.ts 00001-ollier-disease || echo "slide sample errored"
            if [ -n "$(git status --porcelain cases)" ]; then
              git add cases/00001-ollier-disease/*-ai.png
              git commit -m "chore: gpt-image-2 slide sample [skip ci]"
            fi
            sync_repo
            exit 0
          fi
          git config user.name "xray-poster"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Top up the queue once per chain run, before the polling loop. Generates new
          # cases (AI X-ray + rendered slides) until pending+approved unposted cases reach
          # BOT_QUEUE_TARGET; no-ops when the queue is already full. BOT_AUTO_APPROVE is ON
          # (see the env block), so generated cases post without manual approval — the safety
          # gate is the Claude X-ray anatomy QA, which flags a failed image needsReview and
          # NEVER auto-posts it (auto-approve does not bypass needsReview). Commit new cases/**
          # + conditions.json + the used-diagnoses lock so the no-repeat history survives restarts.
          echo "::group::queue top-up ($(date -u +%H:%M) UTC)"
          npm run generate -- --topup --threads-only || echo "top-up errored, continuing"
          if [ -n "$(git status --porcelain cases data/conditions.json data/used-diagnoses.json)" ]; then
            git add cases data/conditions.json data/used-diagnoses.json
            git commit -m "chore: top up case queue [skip ci]"
          fi
          sync_repo
          echo "::endgroup::"
          start=$(date +%s)
          fails=0
          for i in $(seq 1 60); do
            echo "::group::poll $i ($(date -u +%H:%M) UTC)"
            if npm run live; then fails=0; else fails=$((fails+1)); echo "iteration $i errored ($fails in a row)"; fi
            if [ -n "$(git status --porcelain state.json cases data/used-diagnoses.json)" ]; then
              git add state.json cases data/used-diagnoses.json
              git commit -m "chore: update poster state [skip ci]"
            fi
            sync_repo
            echo "::endgroup::"
            # Surface a real outage (dead token, Anthropic billing, ...) that the per-iteration
            # '|| continue' would otherwise hide behind a green run: after 6 consecutive failures,
            # fail the job so GitHub emails. The */30 cron restarts the chain.
            if [ "$fails" -ge 6 ]; then echo "::error::$fails consecutive live failures — aborting so the outage surfaces"; exit 1; fi
            if [ $(( $(date +%s) - start )) -ge "$MAXSECS" ]; then break; fi
            sleep 300
          done
          # Perpetual chain: always launch the next run so a loop is ALWAYS alive.
          # Each cycle only acts on due cases, so off-schedule runs just no-op.
          # Concurrency keeps it a single chain; the */30 cron restarts it only if a
          # hand-off ever fails.
          echo "Launching the next run (keeps the poster live 24/7)."
          gh workflow run publish.yml -f mode=live || echo "hand-off dispatch failed"
